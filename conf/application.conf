play.modules.enabled += "Module"

######################
# DB configurations
######################
# Evolutions
play.evolutions.db.default.autoApply = true
# H2 in-memory database (only used when service.backend = "db")
db.default.driver = org.h2.Driver
# The MODE=PostgreSQL flag makes H2 behave like Postgres (SQL syntax compatibility)
db.default.url = "jdbc:h2:mem:shoppinglist;DB_CLOSE_DELAY=-1;MODE=PostgreSQL"
db.default.username = "sa"
db.default.password = ""

